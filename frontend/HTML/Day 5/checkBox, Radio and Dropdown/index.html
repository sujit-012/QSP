<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--//? checkbox -->
    <form action="">
        <h1></h1>
        <label for="Hindi">Hindi</label>
        <input type="checkbox" id="Hindi"> <br> <br>

        <label for="Marathi">Marathi</label>
        <input type="checkbox" id="Marathi"> <br> <br>

        <label for="English">English</label>
        <input type="checkbox" id="English"> <br> <br>

        <label for="Telugu">Telugu</label>
        <input type="checkbox" id="Telugu"> <br> <br>

        <button>click</button>
    </form>
<hr>
    <!--//! Radio Button -->
    <form action="">
        <label for="HindiR">Hindi</label>
        <input type="radio" id="HindiR" name="MotherTongue"> <br> <br>

        <label for="MarathiR">Marathi</label>
        <input type="radio" id="MarathiR" name="MotherTongue"> <br> <br>

        <label for="EnglishR">English</label>
        <input type="radio" id="EnglishR" name="MotherTongue"> <br> <br>

        <label for="TeluguR">Telugu</label>
        <input type="radio" id="TeluguR" name="MotherTongue"> <br> <br>

        <button>click</button>
    </form>
<hr>
    <!--//* Dropdown -->
    <form action="">
        <select name="" id="">
            <option value="">Select Language</option>
            <option value="">Hindi</option>
            <option value="">English</option>
            <option value="">Marathi</option>
            <option value="">Telugu</option>
            <option value="">Gujarati</option>
        </select>
    </form>
</body>
</html>
