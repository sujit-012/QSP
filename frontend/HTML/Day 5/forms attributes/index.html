<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <input type="text" placeholder="Sujit Banafar">
        <input type="text" minlength="10" maxlength="10" placeholder="minlength and maxlength">
        <input type="text" accesskey="a" placeholder="use alt + a">
        <input type="text" accesskey="b" placeholder="use alt + b">
        <input type="text" autofocus>
        <input type="checkbox" checked>
        <input type="text" disabled>
        <input type="text" readonly>
        <input type="text" draggable="true">
        <input type="text" required> <span style="color: red;"><sup>*</sup></span>
        <input type="checkbox" disabled checked>
        <textarea name="" id="" placeholder="write a review" style="height: 40px;"></textarea>
        <button>click</button>
    </form>
</body>
</html>
