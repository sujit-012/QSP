<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Formatting Demostration</title>
</head>
<body>
    <p>Hello <b>Sujit</b></p>
    <p>Hello <i>Sujit</i></p>
    <p>Hello <u>Sujit</u></p>
    <p>Hello <del>Sujit</del></p>
    <p>Hello <strong>Sujit</strong></p>
    <p>Hello <em>Sujit</em></p>
    <p>Hello <mark>Sujit</mark></p>
    <p>H <sub>2</sub>O</p>
    <p>x <sup>2</sup></p>
</body>
</html>
